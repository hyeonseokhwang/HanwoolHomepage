<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SmartEditor2 Wrapper</title>
    <style>
      body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; }
      .toolbar { padding: 6px 8px; background:#f1f5f9; border-bottom:1px solid #e2e8f0; font-size:12px; color:#334155 }
      #container { padding: 8px; }
      /* ── 이미지 리사이즈 오버레이 (se-init-v2.js에서 wysiwyg doc에 동적 주입됨) ── */
      .se2-resize-overlay { position:absolute; display:none; border:2px solid #4f8ef7; box-sizing:border-box; z-index:9999; pointer-events:none; }
      .se2-resize-handle { position:absolute; width:10px; height:10px; background:#fff; border:2px solid #4f8ef7; border-radius:2px; box-sizing:border-box; pointer-events:all; z-index:10000; }
      .se2-resize-nw { top:-5px; left:-5px; cursor:nw-resize; }
      .se2-resize-n  { top:-5px; left:calc(50% - 5px); cursor:n-resize; }
      .se2-resize-ne { top:-5px; right:-5px; cursor:ne-resize; }
      .se2-resize-e  { top:calc(50% - 5px); right:-5px; cursor:e-resize; }
      .se2-resize-se { bottom:-5px; right:-5px; cursor:se-resize; }
      .se2-resize-s  { bottom:-5px; left:calc(50% - 5px); cursor:s-resize; }
      .se2-resize-sw { bottom:-5px; left:-5px; cursor:sw-resize; }
      .se2-resize-w  { top:calc(50% - 5px); left:-5px; cursor:w-resize; }
    </style>
  </head>
  <body>
    <div class="toolbar">SmartEditor2 초기화 중…</div>
    <div id="container">
      <form>
        <textarea id="ir1" name="ir1" rows="10" cols="100" style="width:100%; height:480px; display:none;"></textarea>
      </form>
    </div>

    <script>
      (async function(){
        function loadScript(url){
          return new Promise((res, rej) => { const s = document.createElement('script'); s.src = url; s.onload = res; s.onerror = rej; document.head.appendChild(s);});
        }
        // static 경로 직접 사용 (dist 폴더 없음 확인됨 — Inspector 2026-04-08)
        const base = '/public/vendor/smarteditor2/static';
        const jsUrl = base + '/js/service/HuskyEZCreator.js';
        try {
          await loadScript(jsUrl);
        } catch (e) {
          document.querySelector('.toolbar').textContent = 'SmartEditor2 스크립트 로드 실패';
          return;
        }

        // Initialize editor
        window.oEditors = [];
        const sLang = 'ko_KR';
        nhn.husky.EZCreator.createInIFrame({
          oAppRef: window.oEditors,
          elPlaceHolder: 'ir1',
          sSkinURI: base + '/SmartEditor2Skin.html',
          htParams : {
            bUseToolbar : true,
            bUseVerticalResizer : true,
            bUseModeChanger : true,
            I18N_LOCALE : sLang
          },
          fOnAppLoad : function(){
            document.querySelector('.toolbar').textContent = 'SmartEditor2 준비 완료';
            if (window.parent && window.parent.seInitAttachToEditor) {
              try {
                // SE2 완전 로드 시점: se2_input_wysiwyg 직접 탐색하여 doc 부모에 전달
                let wysiwygDoc = null;
                const allFrames = document.querySelectorAll('iframe');
                for (const f of allFrames) {
                  try {
                    const fd = f.contentDocument || f.contentWindow?.document;
                    if (fd) {
                      const inner = fd.querySelector('iframe.se2_input_wysiwyg');
                      if (inner) {
                        wysiwygDoc = inner.contentDocument || inner.contentWindow?.document;
                        break;
                      }
                    }
                  } catch(e) {}
                }
                window.parent.seInitAttachToEditor(window.oEditors.getById['ir1'], 0, wysiwygDoc);
              } catch(e) { console.error('[se-wrapper fOnAppLoad]', e); }
            }
          },
          fCreator: 'createSEditor2'
        });
      })();
    </script>
  </body>
</html>
